name: Semver Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  semver-checks:
    name: Semver Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: "pocketflow-core, agent-client, github, config, agent-nexus, agent-forge, pair-harness"
          baseline-rev: main
